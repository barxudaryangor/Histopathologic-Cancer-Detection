# ── Paths ──────────────────────────────────────────────
paths:
  data_dir:       "data"
  train_dir:      "data/train"
  test_dir:       "data/test"
  labels_csv:     "data/train_labels.csv"
  checkpoint_dir: "checkpoints"
  log_dir:        "logs"
  output_dir:     "outputs"

# ── Data ───────────────────────────────────────────────
data:
  img_size:  96
  val_size:  0.2
  num_workers: 2

# ── Training ──────────────────────────────────────────
training:
  batch_size:    64
  num_epochs:    10
  lr:            1.0e-4
  weight_decay:  1.0e-4
  patience:      3
  seed:          42
  scheduler:     "cosine"

# ── Model registry ────────────────────────────────────
models:
  - name: "Custom CNN"
    checkpoint: "Custom_CNN.pt"
  - name: "ResNet-34"
    checkpoint: "ResNet_34.pt"
  - name: "EfficientNet-B0"
    checkpoint: "EfficientNet_B0.pt"
  - name: "DenseNet-121"
    checkpoint: "DenseNet_121.pt"

# ── Visualization ─────────────────────────────────────
colors:
  "Custom CNN":      "steelblue"
  "ResNet-34":       "tomato"
  "EfficientNet-B0": "seagreen"
  "DenseNet-121":    "darkorange"

# ── Gradio app ─────────────────────────────────────────
app:
  default_model: "DenseNet-121"
  server_port:   7860
